  - id: repository_pattern
    name: "Repository Pattern"
    category: "data_access"
    first_seen: '2026-05-12'
    last_used: '2026-05-12'
    usage_count: 0
    success_rate: 0.0
    confidence_level: 85

    description: "Encapsulates data access logic behind a consistent interface"

    contexts:
      - "Database operations"
      - "API integrations"
      - "File system access"
      - "Cache management"

    template: |
      interface Repository<T> {
        findAll(options?: QueryOptions): Promise<T[]>
        findById(id: string): Promise<T | null>
        findOne(criteria: Partial<T>): Promise<T | null>
        create(entity: Omit<T, 'id'>): Promise<T>
        update(id: string, entity: Partial<T>): Promise<T>
        delete(id: string): Promise<boolean>
        exists(id: string): Promise<boolean>
      }

    implementation_notes:
      - "Always return null for not found, never throw"
      - "Use transactions for multi-step operations"
      - "Implement caching at repository level"
      - "Add logging for all operations"

    test_requirements:
      - "Mock the underlying data source"
      - "Test error handling"
      - "Verify transaction rollback"
      - "Check cache invalidation"

  - id: circuit_breaker
    name: "Circuit Breaker Pattern"
    category: "resilience"
    first_seen: '2026-05-12'
    last_used: '2026-05-12'
    usage_count: 0
    success_rate: 0.0
    confidence_level: 75

    description: "Prevents cascading failures by stopping calls to failing services"

    contexts:
      - "External API calls"
      - "Microservice communication"
      - "Database connections"
      - "Third-party integrations"

    template: |
      class CircuitBreaker {
        private state: 'CLOSED' | 'OPEN' | 'HALF_OPEN' = 'CLOSED'
        private failureCount = 0
        private successCount = 0
        private lastFailureTime?: Date

        constructor(
          private threshold: number = 5,
          private timeout: number = 60000,
          private resetTimeout: number = 30000
        ) {}

        async execute<T>(operation: () => Promise<T>): Promise<T> {
          if (this.state === 'OPEN') {
            if (this.shouldAttemptReset()) {
              this.state = 'HALF_OPEN'
            } else {
              throw new Error('Circuit breaker is OPEN')
            }
          }

          try {
            const result = await operation()
            this.onSuccess()
            return result
          } catch (error) {
            this.onFailure()
            throw error
          }
        }
      }

    implementation_notes:
      - "Configure thresholds based on service SLA"
      - "Log state transitions"
      - "Emit metrics for monitoring"
      - "Provide fallback mechanisms"

  - id: event_sourcing
    name: "Event Sourcing Pattern"
    category: "architecture"
    first_seen: '2026-05-12'
    last_used: '2026-05-12'
    usage_count: 0
    success_rate: 0.0
    confidence_level: 70

    description: "Store state changes as a sequence of events"

    contexts:
      - "Audit logging"
      - "Financial transactions"
      - "Order processing"
      - "State machines"

    template: |
      interface Event {
        id: string
        aggregateId: string
        type: string
        payload: any
        metadata: {
          timestamp: Date
          userId?: string
          version: number
        }
      }

      class EventStore {
        async append(event: Event): Promise<void>
        async getEvents(aggregateId: string, fromVersion?: number): Promise<Event[]>
        async getSnapshot(aggregateId: string): Promise<any>
      }

